<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Social Card - Weekend Reminder</title>
  <style>
    body{margin:0;background:#151c20;display:grid;place-items:center;min-height:100vh;font-family:Arial,sans-serif}
    .card{width:min(1080px,100vw);aspect-ratio:1;position:relative;overflow:hidden;background:#151c20;color:#fffaf1}
    .card:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(11,17,20,.98),rgba(11,17,20,.34)),url("https://cdn.dealrimages.com/TA/OT/D5/ENH6JVAOFWZPUO.jpg") center/cover}
    .stripe{position:absolute;right:-120px;top:-120px;width:420px;height:1300px;background:rgba(216,63,49,.78);transform:rotate(26deg)}
    .copy{position:absolute;left:68px;right:110px;bottom:70px;z-index:1}
    b{color:#f2b84b;font-size:28px;text-transform:uppercase}
    h1{margin:16px 0;font-size:88px;line-height:.9;text-transform:uppercase}
    p{margin:0;font-size:32px;line-height:1.25}
  </style>
</head>
<body><div class="card"><div class="stripe"></div><div class="copy"><b>Weekend reminder</b><h1>Check the lot before the drive.</h1><p>Call Stan's Auto Sales to confirm availability before visiting Newton Street.</p></div></div></body>
</html>
