<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Social Card - Local Search</title>
  <style>
    body{margin:0;background:#0b1114;display:grid;place-items:center;min-height:100vh;font-family:Arial,sans-serif}
    .card{width:min(1080px,100vw);aspect-ratio:1;position:relative;overflow:hidden;background:#0b1114;color:#fffaf1}
    .card:before{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(11,17,20,.96),rgba(11,17,20,.24)),url("https://cdn.dealrimages.com/QO/4W/DF/UWXRDLEWBZKELN.jpg") center/cover}
    .card:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(120deg,transparent 0 44px,rgba(242,184,75,.22) 44px 47px,transparent 47px 92px)}
    .copy{position:absolute;left:70px;right:70px;bottom:74px;z-index:1}
    b{color:#f2b84b;font-size:30px;text-transform:uppercase}
    h1{margin:18px 0 26px;font-size:94px;line-height:.88;text-transform:uppercase}
    p{margin:0;font-size:30px;line-height:1.25}
    span{display:inline-block;margin-top:32px;padding:20px 24px;background:#f2b84b;color:#0b1114;font-size:28px;font-weight:900;text-transform:uppercase}
  </style>
</head>
<body><div class="card"><div class="copy"><b>Stan's Auto Sales</b><h1>Family car search? Start local.</h1><p>Browse online, call ahead, test drive in Westminster.</p><span>View inventory</span></div></div></body>
</html>
