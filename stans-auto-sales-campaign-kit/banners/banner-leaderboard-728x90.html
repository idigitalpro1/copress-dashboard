<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Leaderboard</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 728px;
      height: 90px;
      display: grid;
      grid-template-columns: 142px 1fr 150px;
      overflow: hidden;
      background: #15191c;
      color: #fffdf7;
      border: 1px solid #34444d;
    }
    img { width: 142px; height: 90px; object-fit: cover; }
    .copy { padding: 12px 14px; display: grid; align-content: center; gap: 4px; min-width: 0; }
    b { color: #d49b38; font-size: 13px; text-transform: uppercase; }
    strong { font-size: 22px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    span { color: #dcecf5; font-size: 12px; }
    .cta { display: grid; align-content: center; justify-items: center; gap: 5px; background: #2f8d66; padding: 10px; font-size: 12px; font-weight: 800; text-align: center; }
    .cta em { font-style: normal; color: #15191c; background: #d49b38; border-radius: 6px; padding: 7px 10px; }
  </style>
</head>
<body>
  <a class="ad" href="https://www.stansautosalesllc.com/inventory" target="_blank" rel="noopener">
    <img src="https://cdn.dealrimages.com/QO/4W/DF/UWXRDLEWBZKELN.jpg" alt="Stan's Auto Sales inventory vehicle">
    <div class="copy">
      <b>Stan's Auto Sales</b>
      <strong>Used cars, SUVs, trucks and vans in Westminster</strong>
      <span>7192 Newton St | Ask for Scott: (720) 371-5021</span>
    </div>
    <div class="cta"><em>View Inventory</em><span>Call ahead</span></div>
  </a>
</body>
</html>
