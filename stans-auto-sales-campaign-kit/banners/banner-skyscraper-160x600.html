<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Skyscraper</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 160px;
      height: 600px;
      display: grid;
      grid-template-rows: 190px 1fr auto;
      overflow: hidden;
      background: #15191c;
      color: #fffdf7;
      border: 1px solid #34444d;
      text-decoration: none;
    }
    img { width: 160px; height: 190px; object-fit: cover; }
    .copy { padding: 16px 13px; display: grid; align-content: start; gap: 13px; }
    b { color: #d49b38; font-size: 12px; text-transform: uppercase; line-height: 1.2; }
    strong { font-size: 27px; line-height: 1.04; }
    span { color: #dcecf5; font-size: 13px; line-height: 1.45; }
    em { margin: 0 13px 14px; display: grid; place-items: center; min-height: 42px; font-style: normal; background: #2f8d66; border-radius: 6px; font-size: 12px; font-weight: 900; text-align: center; }
  </style>
</head>
<body>
  <a class="ad" href="https://www.stansautosalesllc.com/inventory" target="_blank" rel="noopener">
    <img src="https://cdn.dealrimages.com/EN/EC/P3/HTTSPHUIP9EBFK.jpg" alt="Stan's Auto Sales vehicle">
    <div class="copy">
      <b>Stan's Auto Sales</b>
      <strong>Browse local. Call ahead. Test drive in Westminster.</strong>
      <span>Scott Swan<br>(720) 371-5021</span>
    </div>
    <em>View Inventory</em>
  </a>
</body>
</html>
