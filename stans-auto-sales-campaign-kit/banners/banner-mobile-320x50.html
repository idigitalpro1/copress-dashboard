<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Mobile Banner</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 320px;
      height: 50px;
      display: grid;
      grid-template-columns: 58px 1fr 72px;
      overflow: hidden;
      background: #15191c;
      color: #fffdf7;
      border: 1px solid #34444d;
      text-decoration: none;
    }
    img { width: 58px; height: 50px; object-fit: cover; }
    .copy { padding: 7px 8px; min-width: 0; }
    strong { display: block; font-size: 14px; line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    span { display: block; color: #dcecf5; font-size: 10px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    em { display: grid; place-items: center; font-style: normal; color: #15191c; background: #d49b38; font-size: 11px; font-weight: 900; text-align: center; padding: 4px; }
  </style>
</head>
<body>
  <a class="ad" href="tel:+17203715021">
    <img src="https://cdn.dealrimages.com/3L/RG/6W/H0WV9ZPJSND1YN.jpg" alt="Used vehicle">
    <div class="copy">
      <strong>Used cars in Westminster</strong>
      <span>Ask for Scott: (720) 371-5021</span>
    </div>
    <em>Call Scott</em>
  </a>
</body>
</html>
