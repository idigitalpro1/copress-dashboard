<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Half Page</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 300px;
      height: 600px;
      display: grid;
      grid-template-rows: 250px 1fr auto;
      overflow: hidden;
      color: #1d2428;
      background: #fffdf7;
      border: 1px solid rgba(29,36,40,.18);
      text-decoration: none;
    }
    img { width: 300px; height: 250px; object-fit: cover; }
    .copy { padding: 24px; display: grid; gap: 14px; align-content: start; }
    b { color: #2f8d66; font-size: 12px; text-transform: uppercase; }
    strong { font-size: 34px; line-height: 1.02; color: #15191c; }
    span { color: #647078; font-size: 15px; line-height: 1.45; }
    .contact { color: #15191c; font-weight: 900; }
    em { margin: 0 24px 24px; display: grid; place-items: center; min-height: 46px; font-style: normal; background: #d49b38; border-radius: 6px; color: #15191c; font-size: 14px; font-weight: 900; }
  </style>
</head>
<body>
  <a class="ad" href="https://www.stansautosalesllc.com/inventory" target="_blank" rel="noopener">
    <img src="https://cdn.dealrimages.com/HX/AW/3D/DU8BGUC572BCV3.jpg" alt="Used vehicle from Stan's Auto Sales">
    <div class="copy">
      <b>Westminster family car finder</b>
      <strong>Find the practical next car close to home.</strong>
      <span>Cars, SUVs, vans, trucks, and wagons at Stan's Auto Sales on Newton St.</span>
      <span class="contact">Ask for Scott Swan:<br>(720) 371-5021</span>
    </div>
    <em>Browse Inventory</em>
  </a>
</body>
</html>
