<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Medium Rectangle</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 300px;
      height: 250px;
      display: grid;
      grid-template-rows: 132px 1fr;
      overflow: hidden;
      color: #1d2428;
      background: #fffdf7;
      border: 1px solid rgba(29,36,40,.18);
    }
    img { width: 300px; height: 132px; object-fit: cover; display: block; }
    .copy { padding: 14px; display: grid; gap: 7px; align-content: center; }
    b { color: #2f8d66; font-size: 12px; text-transform: uppercase; }
    strong { font-size: 24px; line-height: 1.03; }
    span { color: #647078; font-size: 12px; line-height: 1.35; }
    em { justify-self: start; font-style: normal; background: #d49b38; color: #15191c; border-radius: 6px; padding: 8px 10px; font-size: 12px; font-weight: 900; }
  </style>
</head>
<body>
  <a class="ad" href="https://www.stansautosalesllc.com/inventory" target="_blank" rel="noopener">
    <img src="https://cdn.dealrimages.com/TA/OT/D5/ENH6JVAOFWZPUO.jpg" alt="Pre-owned vehicle from Stan's Auto Sales">
    <div class="copy">
      <b>Westminster car finder</b>
      <strong>Your next daily driver may be close to home.</strong>
      <span>Ask for Scott Swan: (720) 371-5021</span>
      <em>Browse Inventory</em>
    </div>
  </a>
</body>
</html>
