<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stan's Auto Sales Social Square</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f6f1e8; }
    .ad {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      display: grid;
      align-items: end;
      color: #fffdf7;
      background:
        linear-gradient(0deg, rgba(21,25,28,.95) 0%, rgba(21,25,28,.64) 42%, rgba(21,25,28,.08) 100%),
        url("https://cdn.dealrimages.com/QO/4W/DF/UWXRDLEWBZKELN.jpg") center / cover no-repeat;
    }
    .copy { padding: 72px; display: grid; gap: 24px; max-width: 860px; }
    b { color: #d49b38; font-size: 34px; text-transform: uppercase; }
    strong { font-size: 86px; line-height: 1.02; letter-spacing: 0; }
    span { font-size: 34px; line-height: 1.35; color: #dcecf5; }
    em { justify-self: start; font-style: normal; background: #d49b38; color: #15191c; border-radius: 8px; padding: 22px 30px; font-size: 30px; font-weight: 900; }
  </style>
</head>
<body>
  <div class="ad">
    <div class="copy">
      <b>Stan's Auto Sales</b>
      <strong>Family car search? Start local.</strong>
      <span>Used cars, SUVs, vans, trucks, and wagons in Westminster. Ask for Scott Swan: (720) 371-5021.</span>
      <em>Browse inventory before you visit</em>
    </div>
  </div>
</body>
</html>
