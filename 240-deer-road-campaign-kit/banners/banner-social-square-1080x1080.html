<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>240 Deer Road Social Square</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f8f4ec; }
    .ad {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      display: grid;
      align-items: end;
      color: #fffdf7;
      background:
        linear-gradient(0deg, rgba(18,48,38,.94) 0%, rgba(18,48,38,.62) 42%, rgba(18,48,38,.08) 100%),
        url("https://www.compass.com/m/42114221f1182f5f95b13f86f66987120ed0aa86_img_0_27108/origin.jpg") center / cover no-repeat;
    }
    .copy { padding: 72px; display: grid; gap: 24px; max-width: 860px; }
    b { color: #d8d0c1; font-size: 34px; text-transform: uppercase; }
    strong { font-size: 86px; line-height: 1.02; letter-spacing: 0; }
    span { font-size: 34px; line-height: 1.35; color: #dce8ea; }
    em { justify-self: start; font-style: normal; background: #b56b3c; color: #fffdf7; border-radius: 8px; padding: 22px 30px; font-size: 30px; font-weight: 900; }
  </style>
</head>
<body>
  <div class="ad">
    <div class="copy">
      <b>240 Deer Road</b>
      <strong>Evergreen A-frame on one acre.</strong>
      <span>3 beds, 1 bath, 1,270 square feet, active at $525,000. Bailey Orcutt, Compass.</span>
      <em>View the listing</em>
    </div>
  </div>
</body>
</html>
