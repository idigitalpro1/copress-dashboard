<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rick's Cabaret Half Page 300x600</title>
  <style>
    html,body{margin:0;width:300px;height:600px;overflow:hidden;background:#08080a;font-family:Inter,Arial,sans-serif}
    .ad{position:relative;width:300px;height:600px;color:#fff;border:1px solid #d8b46a;box-sizing:border-box;text-decoration:none;display:block;background:#08080a}
    .hero{height:290px;background:url("https://satcom.5280.menu/ricks-cabaret-campaign-kit/assets/steakhouse.jpg") center/cover}
    .copy{padding:22px 20px}
    .eyebrow{font-size:11px;color:#d8b46a;font-weight:700}
    h1{font-family:Georgia,serif;font-size:34px;line-height:1.02;margin:10px 0 12px}
    p{font-size:14px;line-height:1.55;margin:0 0 16px;color:#d9d0c4}
    .details{font-size:12px;color:#9d9487;margin-bottom:18px}
    .cta{display:block;background:#d8b46a;color:#08080a;text-align:center;font-size:13px;font-weight:700;padding:12px;border-radius:4px}
  </style>
</head>
<body>
  <a class="ad" href="https://www.rickscentral.com/steakhouse-reservations-central-city-colorado/" aria-label="Reserve Rick's steakhouse">
    <div class="hero"></div>
    <div class="copy">
      <div class="eyebrow">Late-night steakhouse + cabaret</div>
      <h1>Your Black Hawk night needs a finish.</h1>
      <p>Reserve the third-floor steakhouse, then keep the night moving with music, full bar service, and cabaret entertainment.</p>
      <div class="details">Thu-Sun | 6 PM-4 AM | 21+ only</div>
      <span class="cta">Reserve Steakhouse Seating</span>
    </div>
  </a>
</body>
</html>
