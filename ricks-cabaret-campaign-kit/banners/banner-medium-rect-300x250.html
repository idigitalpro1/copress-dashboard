<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rick's Cabaret Medium Rectangle 300x250</title>
  <style>
    html,body{margin:0;width:300px;height:250px;overflow:hidden;background:#08080a;font-family:Inter,Arial,sans-serif}
    .ad{position:relative;width:300px;height:250px;color:#fff;border:1px solid #d8b46a;box-sizing:border-box;text-decoration:none;display:block;background:#08080a}
    .photo{position:absolute;inset:0;background:url("https://copress-dashboard.vercel.app/ricks-cabaret-campaign-kit/assets/hero-ricks-cabaret-central-city.jpg") center/cover;opacity:.58}
    .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,10,.25),#08080a 86%)}
    .copy{position:absolute;left:18px;right:18px;bottom:16px}
    .eyebrow{font-size:11px;color:#d8b46a;font-weight:700}
    .stars{margin-top:7px;color:#f3d27a;font-size:13px;font-weight:700;letter-spacing:.08em}
    h1{font-family:Georgia,serif;font-size:27px;line-height:1.05;margin:7px 0 8px}
    p{font-size:13px;line-height:1.35;margin:0 0 14px;color:#f4eee2}
    .cta{display:inline-block;background:#d8b46a;color:#08080a;font-size:12px;font-weight:700;padding:9px 12px;border-radius:4px}
  </style>
</head>
<body>
  <a class="ad" href="https://www.rickscentral.com/" aria-label="Rick's Cabaret Central City campaign">
    <div class="photo"></div><div class="shade"></div>
    <div class="copy">
      <div class="eyebrow">Near Black Hawk</div>
      <div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733; 5-Star Nightlife</div>
      <h1>Dinner. Lounge. Cabaret.</h1>
      <p>Make the casino weekend feel planned at Rick's Central City. 21+.</p>
      <span class="cta">Plan the Night</span>
    </div>
  </a>
</body>
</html>
