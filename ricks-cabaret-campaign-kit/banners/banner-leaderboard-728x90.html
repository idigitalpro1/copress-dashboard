<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rick's Cabaret Leaderboard 728x90</title>
  <style>
    html,body{margin:0;width:728px;height:90px;overflow:hidden;background:#08080a;font-family:Inter,Arial,sans-serif}
    .ad{width:728px;height:90px;display:grid;grid-template-columns:148px 1fr 152px;background:#08080a;color:#f4eee2;border:1px solid #d8b46a;box-sizing:border-box}
    .photo{background:url("https://copress-dashboard.vercel.app/ricks-cabaret-campaign-kit/assets/steakhouse.jpg") center/cover}
    .copy{padding:10px 18px}
    .brand{font-family:Georgia,serif;font-size:21px;font-weight:700;color:#fff;line-height:1}
    .stars{margin-top:5px;color:#d8b46a;font-size:12px;font-weight:700;letter-spacing:.08em}
    .line{margin-top:5px;font-size:12px;color:#d8b46a}
    .cta{display:flex;align-items:center;justify-content:center;background:#3f1118;color:#fff;font-size:12px;font-weight:700;text-align:center;padding:0 12px}
    .cta span{display:block;background:#d8b46a;color:#08080a;padding:9px 12px;border-radius:4px}
  </style>
</head>
<body>
  <a class="ad" href="https://www.rickscentral.com/steakhouse-reservations-central-city-colorado/" aria-label="Reserve Rick's Cabaret Central City">
    <div class="photo"></div>
    <div class="copy">
      <div class="brand">Rick's Cabaret Central City</div>
      <div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733; 5-Star Nightlife</div>
      <div class="line">Late-night steakhouse + cabaret minutes from Black Hawk. 21+.</div>
    </div>
    <div class="cta"><span>Reserve Tonight</span></div>
  </a>
</body>
</html>
