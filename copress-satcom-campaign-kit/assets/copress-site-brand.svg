<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CoPress site brand masthead for The Nest</title>
  <desc id="desc">Brand artwork adapted from the CoPress dashboard masthead with gold hairline, dark operator shell, and module chips.</desc>
  <defs>
    <linearGradient id="goldline" x1="0" x2="1">
      <stop offset="0" stop-color="#c8a84b" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#c8a84b"/>
      <stop offset="0.8" stop-color="#c8a84b"/>
      <stop offset="1" stop-color="#c8a84b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="70%">
      <stop offset="0" stop-color="#c8a84b" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#070c14" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="#070c14"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldline)"/>
  <rect x="42" y="42" width="1116" height="276" rx="12" fill="#0d1520" stroke="#c8a84b" stroke-opacity="0.22"/>
  <circle cx="154" cy="170" r="74" fill="#060a10" stroke="#c8a84b" stroke-width="3"/>
  <circle cx="154" cy="170" r="52" fill="none" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="2"/>
  <text x="154" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#e2ddd5">N</text>
  <text x="154" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3" fill="#c8a84b">NEST</text>
  <text x="260" y="140" font-family="Georgia, serif" font-size="64" font-weight="900" fill="#c8a84b">copress</text>
  <text x="485" y="140" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#786f5d">.news</text>
  <text x="676" y="138" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#4a5060">|</text>
  <text x="714" y="137" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="#8a8480">THE NEST</text>
  <text x="260" y="184" font-family="Arial, sans-serif" font-size="15" font-weight="500" letter-spacing="3" fill="#8a8480">OPERATOR CAMPAIGN KIT FROM THE LIVE DASHBOARD BRAND SYSTEM</text>
  <g font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6">
    <rect x="260" y="226" width="128" height="38" rx="3" fill="#111d2e" stroke="#c8a84b" stroke-opacity="0.3"/>
    <text x="324" y="250" text-anchor="middle" fill="#c8a84b">EDITORIAL</text>
    <rect x="402" y="226" width="142" height="38" rx="3" fill="#111d2e" stroke="#1abc9c" stroke-opacity="0.3"/>
    <text x="473" y="250" text-anchor="middle" fill="#1abc9c">MARKETING</text>
    <rect x="558" y="226" width="154" height="38" rx="3" fill="#111d2e" stroke="#2c7be5" stroke-opacity="0.3"/>
    <text x="635" y="250" text-anchor="middle" fill="#2c7be5">NEWSLETTER</text>
    <rect x="726" y="226" width="118" height="38" rx="3" fill="#111d2e" stroke="#7f8c8d" stroke-opacity="0.36"/>
    <text x="785" y="250" text-anchor="middle" fill="#aeb5ba">BILLING</text>
    <rect x="858" y="226" width="132" height="38" rx="3" fill="#111d2e" stroke="#3498db" stroke-opacity="0.35"/>
    <text x="924" y="250" text-anchor="middle" fill="#79b9e5">CITY SITES</text>
  </g>
  <g transform="translate(976 94)">
    <rect width="126" height="34" rx="3" fill="#1a0d10" stroke="#c0392b" stroke-opacity="0.34"/>
    <circle cx="20" cy="17" r="5" fill="#c0392b" filter="url(#soft)"/>
    <circle cx="20" cy="17" r="4" fill="#c0392b"/>
    <text x="38" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#c94c4c">LIVE OPS</text>
  </g>
</svg>
