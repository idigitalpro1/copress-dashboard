<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CoPress Nest command center hero</title>
  <desc id="desc">A dark editorial command center with publishing, billing, newsletter, and Nest lanes.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#56b6c8" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#132a42" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#08111f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#fff1b8"/>
      <stop offset="45%" stop-color="#d7a84f"/>
      <stop offset="100%" stop-color="#8f6426"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#08111f"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="800" cy="420" r="320" fill="url(#glow)" opacity="0.72"/>
  <circle cx="800" cy="420" r="230" fill="none" stroke="#56b6c8" stroke-opacity="0.45" stroke-width="2"/>
  <circle cx="800" cy="420" r="150" fill="none" stroke="#d7a84f" stroke-opacity="0.7" stroke-width="2"/>
  <path d="M480 420c115-115 525-115 640 0-115 115-525 115-640 0Z" fill="#0d1828" stroke="#56b6c8" stroke-opacity="0.55" stroke-width="4"/>
  <path d="M630 470c-50-120 65-230 170-230 105 0 220 110 170 230-95-52-245-52-340 0Z" fill="#101f32" stroke="url(#gold)" stroke-width="5"/>
  <g fill="#f7f1e3" opacity="0.92">
