  <text x="800" y="820" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#a9bacd" text-anchor="middle" letter-spacing="3">CAMPAIGN KIT + CUSTOMER OPERATOR LINK + PRODUCTION KANBAN</text>
