<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoPress Nest Social Square 1080x1080</title>
<style>
  *{box-sizing:border-box} body{margin:0;background:#222;font-family:Inter,Arial,sans-serif}
  .card{width:1080px;height:1080px;position:relative;overflow:hidden;background:#08111f;color:#f7f1e3;display:grid;place-items:center;text-align:center;padding:96px}
  .card:before{content:"";position:absolute;inset:-180px;background:radial-gradient(circle at 50% 32%,#56b6c8aa,#56b6c822 30%,#08111f 62%)}
  .card:after{content:"";position:absolute;inset:70px;border:5px solid #d7a84f;border-radius:42px;opacity:.86}
  .inner{position:relative;z-index:1;max-width:790px}
  .kicker{font-size:28px;font-weight:900;letter-spacing:.28em;text-transform:uppercase;color:#56b6c8;margin-bottom:34px}
  h1{font-family:Georgia,serif;font-size:104px;line-height:.98;margin:0;color:#fff7df}
  p{font-size:35px;line-height:1.3;color:#a9bacd;margin:42px 0 0;font-weight:700}
  .pill{display:inline-flex;margin-top:54px;background:#d7a84f;color:#07101b;border-radius:999px;padding:21px 34px;font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
</style>
</head>
<body>
  <div class="card" role="img" aria-label="CoPress Nest social card">
    <div class="inner">
      <div class="kicker">CoPress Nest</div>
      <h1>Local media needs a spine.</h1>
      <p>Editorial, ads, newsletters, city sites, billing, and operator handoff in one dashboard.</p>
      <div class="pill">Campaign kit ready</div>
    </div>
  </div>
</body>
</html>
