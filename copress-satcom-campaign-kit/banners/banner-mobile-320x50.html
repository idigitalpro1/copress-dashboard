<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoPress SATCOM Mobile 320x50</title>
<style>
  *{box-sizing:border-box} body{margin:0;background:#f1f1f1;font-family:Inter,Arial,sans-serif}
  .ad{width:320px;height:50px;display:grid;grid-template-columns:42px 1fr 76px;align-items:center;background:#08111f;color:#f7f1e3;border:1px solid #56b6c8;text-decoration:none;overflow:hidden}
  .orb{width:30px;height:30px;border-radius:50%;border:2px solid #d7a84f;margin-left:8px;display:grid;place-items:center;font-size:10px;font-weight:900;color:#d7a84f}
  b{display:block;font-size:12px;line-height:1;color:#fff7df}
  span{display:block;color:#a9bacd;font-size:9px;font-weight:700;margin-top:3px}
  .cta{justify-self:end;margin-right:7px;background:#d7a84f;color:#07101b;font-size:10px;font-weight:900;padding:8px 9px;border-radius:4px;text-transform:uppercase}
</style>
</head>
<body>
  <a class="ad" href="../index.html#kit" aria-label="Open CoPress SATCOM kit">
    <div class="orb">SAT</div>
    <div><b>CoPress command spine</b><span>Campaigns + billing + newsletter</span></div>
    <div class="cta">Open</div>
  </a>
</body>
</html>
