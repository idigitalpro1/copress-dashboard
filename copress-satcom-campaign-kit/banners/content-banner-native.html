<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoPress SATCOM Native Content Banner</title>
<style>
  *{box-sizing:border-box} body{margin:0;background:#f1f1f1;font-family:Georgia,serif}
  .native{width:640px;height:320px;background:#fbf8ef;color:#08111f;border:1px solid #d7a84f;display:grid;grid-template-columns:210px 1fr;overflow:hidden;text-decoration:none}
  .art{position:relative;background:#08111f;display:grid;place-items:center;overflow:hidden}
  .art:before{content:"";position:absolute;width:250px;height:250px;border-radius:50%;border:28px solid rgba(86,182,200,.22)}
  .art:after{content:"";position:absolute;width:118px;height:118px;border-radius:50%;border:4px solid #d7a84f}
  .seal{position:relative;z-index:1;color:#d7a84f;font:900 34px Inter,Arial,sans-serif;letter-spacing:0}
  .copy{padding:26px 28px;display:flex;flex-direction:column;justify-content:center}
  b{font:900 12px Inter,Arial,sans-serif;letter-spacing:.22em;text-transform:uppercase;color:#c94c4c;margin-bottom:13px}
  h1{font-size:34px;line-height:1.02;margin:0 0 14px;color:#08111f}
  p{font:600 15px/1.45 Inter,Arial,sans-serif;color:#304057;margin:0}
  span{display:inline-flex;margin-top:22px;align-self:flex-start;background:#08111f;color:#f7f1e3;font:900 12px Inter,Arial,sans-serif;letter-spacing:.09em;text-transform:uppercase;padding:11px 14px;border-radius:4px}
</style>
</head>
<body>
  <a class="native" href="../content/sponsored-post.html" aria-label="Read sponsored post">
    <div class="art"><div class="seal">SATCOM</div></div>
    <div class="copy">
      <b>Sponsored Content</b>
      <h1>The local media stack does not need another disconnected tab.</h1>
      <p>How CoPress turns a campaign brief into banners, newsletter copy, sponsored content, billing handoff, and a visible production lane.</p>
      <span>Read article</span>
    </div>
  </a>
</body>
</html>
