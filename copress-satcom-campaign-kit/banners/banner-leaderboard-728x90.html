<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoPress Nest Leaderboard 728x90</title>
<style>
  *{box-sizing:border-box} body{margin:0;background:#f1f1f1;font-family:Inter,Arial,sans-serif}
  .ad{width:728px;height:90px;display:grid;grid-template-columns:125px 1fr 150px;align-items:center;overflow:hidden;background:#08111f;color:#f7f1e3;border:1px solid #d7a84f;position:relative}
  .ad:before{content:"";position:absolute;inset:-120px 240px -120px 95px;background:radial-gradient(circle,#56b6c8 0,#56b6c800 68%);opacity:.65}
  .mark{position:relative;z-index:1;height:90px;display:grid;place-items:center;background:#111d2e;border-right:1px solid rgba(215,168,79,.45)}
  .orb{width:58px;height:58px;border-radius:50%;border:3px solid #56b6c8;display:grid;place-items:center;color:#d7a84f;font-weight:900;letter-spacing:-1px}
  .copy{position:relative;z-index:1;padding:0 20px}
  b{display:block;color:#56b6c8;font-size:11px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px}
  h1{font-family:Georgia,serif;font-size:25px;line-height:1;margin:0;color:#fff7df}
  p{margin:5px 0 0;color:#a9bacd;font-size:12px;font-weight:600}
  .cta{position:relative;z-index:1;justify-self:center;background:#d7a84f;color:#07101b;text-decoration:none;font-size:13px;font-weight:900;padding:13px 18px;border-radius:5px;text-transform:uppercase;letter-spacing:.08em}
</style>
</head>
<body>
  <a class="ad" href="../index.html#materials" aria-label="Open CoPress Nest campaign kit">
    <div class="mark"><div class="orb">N</div></div>
    <div class="copy">
      <b>CoPress Nest</b>
      <h1>One spine for local publishing.</h1>
      <p>Campaigns, newsletters, billing, city sites, and operator handoff.</p>
    </div>
    <span class="cta">Open Kit</span>
  </a>
</body>
</html>
