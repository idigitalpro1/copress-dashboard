<!-- ============================================================= -->
<!-- CoPress Nest content banner carousel                          -->
<!-- Drop-in for a home page, newsletter landing page, or sponsor   -->
<!-- article rail. Styles are scoped under .cp-nest-carousel.       -->
<!-- ============================================================= -->
<section class="cp-nest-carousel" data-feed="./content-cards.json" aria-label="CoPress Nest content banner carousel">
  <div class="cp-nest-carousel__head">
    <span class="cp-nest-carousel__eyebrow">CoPress Nest · Content Banners</span>
    <h2 class="cp-nest-carousel__title">One brief becomes a full campaign kit.</h2>
    <span class="cp-nest-carousel__by">Editorial, newsletter, city sites, billing, and operator handoff</span>
  </div>
  <div class="cp-nest-carousel__viewport">
    <button class="cp-nest-carousel__nav cp-nest-carousel__nav--prev" aria-label="Previous">‹</button>
    <ul class="cp-nest-carousel__track" role="list"></ul>
    <button class="cp-nest-carousel__nav cp-nest-carousel__nav--next" aria-label="Next">›</button>
  </div>
  <div class="cp-nest-carousel__dots" role="tablist" aria-label="Content banner pages"></div>
</section>

<style>
  .cp-nest-carousel{--bg:#070c14;--card:#0d1520;--line:rgba(200,168,75,.22);--gold:#c8a84b;--cream:#e2ddd5;--mute:#8a8480;--blue:#56b6c8;--red:#c94c4c;
    background:var(--bg);color:var(--cream);padding:54px 20px 64px;border-top:1px solid var(--line);font-family:"DM Sans",system-ui,sans-serif}
  .cp-nest-carousel *{box-sizing:border-box}
  .cp-nest-carousel__head{max-width:1120px;margin:0 auto 26px;text-align:center}
  .cp-nest-carousel__eyebrow{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:800}
  .cp-nest-carousel__title{font-family:"Playfair Display",Georgia,serif;font-weight:800;font-size:clamp(28px,4vw,46px);line-height:1;margin:12px 0 8px}
  .cp-nest-carousel__by{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
  .cp-nest-carousel__viewport{position:relative;max-width:1120px;margin:0 auto;overflow:hidden}
  .cp-nest-carousel__track{display:flex;gap:18px;list-style:none;margin:0;padding:4px;transition:transform .55s cubic-bezier(.4,0,.2,1)}
  .cp-nest-carousel__card{flex:0 0 calc((100% - 36px)/3);background:linear-gradient(145deg,#0d1520,#111d2e);border:1px solid var(--line);min-height:300px;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
  .cp-nest-carousel__card:before{content:"";position:absolute;right:-54px;bottom:-54px;width:168px;height:168px;border-radius:50%;border:22px solid rgba(86,182,200,.16)}
  .cp-nest-carousel__card:hover{border-color:var(--gold);transform:translateY(-3px)}
  .cp-nest-carousel__art{height:92px;background:linear-gradient(135deg,rgba(200,168,75,.18),rgba(86,182,200,.16));border-bottom:1px solid var(--line);display:flex;align-items:center;padding:18px}
  .cp-nest-carousel__seal{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--gold);color:var(--gold);font-family:Georgia,serif;font-size:24px;font-weight:800;background:#060a10}
  .cp-nest-carousel__body{padding:22px 22px 24px;position:relative;z-index:1;flex:1;display:flex;flex-direction:column}
  .cp-nest-carousel__tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-weight:900;margin-bottom:12px}
  .cp-nest-carousel__headline{font-family:"Playfair Display",Georgia,serif;font-size:27px;font-weight:800;line-height:1.05;margin:0 0 12px}
  .cp-nest-carousel__summary{font-size:14px;color:#bac7d4;line-height:1.45;margin:0}
  .cp-nest-carousel__cta{margin-top:auto;padding-top:18px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:900}
  .cp-nest-carousel__nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(7,12,20,.88);color:var(--cream);font-size:20px;cursor:pointer;display:grid;place-items:center}
  .cp-nest-carousel__nav:hover{border-color:var(--gold);color:var(--gold)}
  .cp-nest-carousel__nav--prev{left:6px}.cp-nest-carousel__nav--next{right:6px}
  .cp-nest-carousel__dots{display:flex;justify-content:center;gap:8px;margin-top:22px}
  .cp-nest-carousel__dot{width:8px;height:8px;border-radius:50%;border:0;background:rgba(255,255,255,.18);cursor:pointer;padding:0}
  .cp-nest-carousel__dot[aria-selected="true"]{background:var(--gold)}
  @media(max-width:900px){.cp-nest-carousel__card{flex:0 0 calc((100% - 18px)/2)}}
  @media(max-width:600px){.cp-nest-carousel__card{flex:0 0 100%}}
</style>

<script>
(function(){
  var root=document.currentScript.previousElementSibling;
  while(root && !(root.classList&&root.classList.contains('cp-nest-carousel'))) root=root.previousElementSibling;
  if(!root) return;
  var track=root.querySelector('.cp-nest-carousel__track'),
      dotsWrap=root.querySelector('.cp-nest-carousel__dots'),
      vp=root.querySelector('.cp-nest-carousel__viewport'),
      feed=root.getAttribute('data-feed')||'./content-cards.json',
      page=0, perView=3, pages=1, timer=null;

  var fallback=[
    {tag:'Content banner',title:'Native sponsor module',summary:'Article-style sponsored block for web, newsletter, and city-site placements.',href:'../banners/content-banner-native.html',cta:'Open native banner'},
    {tag:'Sponsored post',title:'Build the spine once. Publish everywhere.',summary:'Finished advertorial copy with the CoPress Nest operator story.',href:'../content/sponsored-post.html',cta:'Open article'},
    {tag:'Newsletter',title:'Feature unit for reader send',summary:'Email-ready block with subject, preheader, CTA, and dashboard positioning.',href:'../email/newsletter-command-spine.html',cta:'Open newsletter'},
    {tag:'Operator handoff',title:'Two links, no messy folder',summary:'Campaign kit plus operator readiness kit for a clean owner send.',href:'../handoff/two-link-handoff.md',cta:'Open handoff'}
  ];

  function perViewFor(){ return window.innerWidth<=600?1:window.innerWidth<=900?2:3; }
  function load(){
    fetch(feed).then(function(r){return r.ok?r.json():Promise.reject();}).then(function(d){
      render(d.cards||fallback);
    }).catch(function(){ render(fallback); });
  }
  function render(cards){
    track.innerHTML='';
    cards.forEach(function(C){
      var a=document.createElement('a');
      a.className='cp-nest-carousel__card'; a.href=C.href||'#'; a.setAttribute('role','listitem');
      a.innerHTML=
        '<div class="cp-nest-carousel__art"><div class="cp-nest-carousel__seal">N</div></div>'+
        '<div class="cp-nest-carousel__body">'+
          '<div class="cp-nest-carousel__tag">'+(C.tag||'Content')+'</div>'+
          '<h3 class="cp-nest-carousel__headline">'+(C.title||'CoPress Nest content unit')+'</h3>'+
          '<p class="cp-nest-carousel__summary">'+(C.summary||'Ready-to-place campaign content.')+'</p>'+
          '<div class="cp-nest-carousel__cta">'+(C.cta||'Open asset')+'</div>'+
        '</div>';
      track.appendChild(a);
    });
    layout(); window.addEventListener('resize',layout);
    root.querySelector('.cp-nest-carousel__nav--next').addEventListener('click',function(){go(page+1);});
    root.querySelector('.cp-nest-carousel__nav--prev').addEventListener('click',function(){go(page-1);});
    start();
    vp.addEventListener('mouseenter',stop); vp.addEventListener('mouseleave',start);
  }
  function layout(){
    perView=perViewFor();
    var cards=track.children.length;
    pages=Math.max(1,Math.ceil(cards/perView));
    if(page>=pages) page=0;
    dotsWrap.innerHTML='';
    for(var i=0;i<pages;i++){
      var b=document.createElement('button');
      b.className='cp-nest-carousel__dot'; b.setAttribute('role','tab');
      b.setAttribute('aria-selected', i===page?'true':'false');
      (function(idx){b.addEventListener('click',function(){go(idx);});})(i);
      dotsWrap.appendChild(b);
    }
    move();
  }
  function go(p){ page=(p+pages)%pages; move(); syncDots(); restart(); }
  function move(){
    var first=track.children[0]; if(!first) return;
    var step=first.getBoundingClientRect().width+18;
    track.style.transform='translateX(-'+(page*perView*step)+'px)';
  }
  function syncDots(){
    Array.prototype.forEach.call(dotsWrap.children,function(d,i){
      d.setAttribute('aria-selected', i===page?'true':'false');
    });
  }
  function start(){ stop(); timer=setInterval(function(){go(page+1);},5200); }
  function stop(){ if(timer){clearInterval(timer);timer=null;} }
  function restart(){ start(); }
  load();
})();
</script>
<!-- ===================== end CoPress Nest content carousel ===================== -->
