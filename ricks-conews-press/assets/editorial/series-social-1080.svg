    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#caa24a"/><stop offset="0.5" stop-color="#f3d27a"/><stop offset="1" stop-color="#b8862f"/></linearGradient>
